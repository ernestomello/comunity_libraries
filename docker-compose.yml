version: '3.8'

services:
  # Base de datos MariaDB
  db:
    image: mariadb:10.11
    container_name: community_libraries_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME:-community_libraries}
      MYSQL_USER: ${DATABASE_USER:-django_user}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-django_password}
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD:-root_password}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Aplicación Django
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: community_libraries_web
    restart: unless-stopped
    environment:
      # Django settings
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-this-key-in-production}
      
      # Database settings
      DATABASE_NAME: ${DATABASE_NAME:-community_libraries}
      DATABASE_USER: ${DATABASE_USER:-django_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-django_password}
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      
      # URLs and hosts
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web,nginx}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://nginx}
      CSRF_ALLOWED_ORIGINS: ${CSRF_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://nginx}
      CORS_ORIGINS_WHITELIST: ${CORS_ORIGINS_WHITELIST:-http://localhost,http://127.0.0.1,http://nginx}
      
      # Static and media files
      STATIC_URL: /static/
      STATIC_ROOT: /app/static_collected
      
      # Email settings (opcional)
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Sistema de Bibliotecas <noreply@example.com>}
      
      # Altcha settings
      ALTCHA_HMAC_KEY: ${ALTCHA_HMAC_KEY:-altcha-development-key-change-in-production}
      
      # Superuser settings
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin123}
      
    volumes:
      - ./media:/app/media
      - static_volume:/app/static_collected
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: community_libraries_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static
      - ./media:/var/www/media
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - app-network

  # Certbot para SSL automático
  certbot:
    image: certbot/certbot:latest
    container_name: community_libraries_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Solo se ejecuta manualmente o por cron
    # No necesita estar siempre corriendo
    profiles:
      - ssl
    command: sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait; done;"

volumes:
  mariadb_data:
  static_volume:
  certbot_www:
  certbot_certs:

networks:
  app-network:
    driver: bridge