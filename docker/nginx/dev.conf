# Configuración de Nginx para desarrollo
# Versión simplificada sin todas las optimizaciones de producción

upstream django_dev {
    server web:8000;
}

server {
    listen 80;
    server_name localhost 127.0.0.1;
    charset utf-8;

    # Logs más detallados para desarrollo
    access_log /var/log/nginx/dev_access.log;
    error_log /var/log/nginx/dev_error.log debug;

    # Archivos estáticos - configuración simple
    location /static/ {
        alias /var/www/static/;
        expires 1m;  # Cache corto para desarrollo
        add_header Cache-Control "public";
    }

    # Archivos de media - configuración simple
    location /media/ {
        alias /var/www/media/;
        expires 1m;  # Cache corto para desarrollo
    }

    # Configuración principal - proxy a Django
    location / {
        proxy_pass http://django_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts más largos para debugging
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Sin buffering para ver errores inmediatamente
        proxy_buffering off;
    }

    # Admin de Django
    location /admin/ {
        proxy_pass http://django_dev;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Tamaño de archivo más grande para desarrollo  
        client_max_body_size 100M;
    }
}