upstream django {
    server web:8000;
}

# Redirección HTTP a HTTPS (opcional - descomentar si usas SSL)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    server_name localhost;
    charset utf-8;

    # Configuraciones de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Configuración para archivos estáticos
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # Compresión para archivos estáticos
        location ~* \.(css|js)$ {
            gzip_static on;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Configuración específica para fuentes
        location ~* \.(eot|ttf|woff|woff2)$ {
            add_header Access-Control-Allow-Origin *;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Configuración para archivos de media
    location /media/ {
        alias /var/www/media/;
        expires 1M;
        add_header Cache-Control "public";
        access_log off;
        
        # Configuración de seguridad para archivos subidos
        location ~* \.(php|pl|py|js|css|sh|exe)$ {
            deny all;
        }
    }

    # Configuración para favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Configuración para robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Bloquear acceso a archivos sensibles
    location ~* /\.(ht|svn|git) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(backup|bak|old|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Configuración principal para la aplicación Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configuración de timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Configuración de buffers
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Configuración para WebSocket (si lo necesitas en el futuro)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Configuración para el panel de administración de Django
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Seguridad adicional para el admin
        client_max_body_size 50M;
    }

    # Página de error personalizada (opcional)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

