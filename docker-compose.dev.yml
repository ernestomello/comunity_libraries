version: '3.8'

# Docker Compose para desarrollo
# Extiende la configuración base con configuraciones específicas para desarrollo

services:
  web:
    environment:
      # Configuración de desarrollo
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: libraries.settings
      
      # Configuración más permisiva para desarrollo
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,web,nginx"
      CSRF_TRUSTED_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000,http://localhost,http://127.0.0.1"
      
    volumes:
      # Montar código para hot-reload
      - .:/app
      # Sobrescribir entrypoint para desarrollo
      - ./docker/dev/entrypoint-dev.sh:/usr/local/bin/docker-entrypoint.sh:ro
    
    ports:
      # Exponer puerto Django directamente para debug
      - "8000:8000"
    
    command: python manage.py runserver 0.0.0.0:8000
    
    # Habilitar stdin para debugging interactivo
    stdin_open: true
    tty: true

  # Nginx para desarrollo (opcional, principalmente para testing)
  nginx:
    ports:
      - "8080:80"  # Puerto diferente para no conflicto con desarrollo
    volumes:
      # Configuración de nginx más simple para dev
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  app-network:
    driver: bridge